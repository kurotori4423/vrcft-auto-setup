name: Update Package Version from Tag

# タグを単一のリリース情報源にするため、package.jsonのversionとurlをタグに合わせる。
on:
  push:
    tags:
      - 'v*'

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check package.json exists
        run: |
          test -f package.json

      - name: Get current package fields
        id: current
        run: |
          echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"
          echo "url=$(jq -r '.url // ""' package.json)" >> "$GITHUB_OUTPUT"

      - name: Update package.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="${{ steps.version.outputs.tag_name }}"
          FILE_NAME=$(jq -r '(.displayName // .name) | gsub("[^A-Za-z0-9._-]+"; ".") | gsub("^\\.|\\.$"; "")' package.json)
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${FILE_NAME}_v${VERSION}.zip"
          jq --arg version "$VERSION" --arg url "$RELEASE_URL" '.version = $version | .url = $url' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet package.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Git
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add package.json
          git commit -m "Update package version to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Trigger release draft workflow
        uses: benc-uk/workflow-dispatch@v1.2.2
        with:
          workflow: CreateReleaseDraft.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{"tag_name": "${{ steps.version.outputs.tag_name }}"}'
